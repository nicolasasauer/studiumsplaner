name: Generate Play Store Screenshots

on:
  workflow_dispatch:

jobs:
  screenshots-7inch:
    name: 7-inch tablet screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run screenshots on 7-inch tablet emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: Nexus 7
          script: |
            cd flutter_app
            flutter drive \
              --driver=test_driver/integration_test.dart \
              --target=integration_test/screenshots_test.dart

      - name: Upload 7-inch screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-7inch-${{ github.sha }}
          path: flutter_app/screenshots/
          retention-days: 30

  screenshots-10inch:
    name: 10-inch tablet screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
