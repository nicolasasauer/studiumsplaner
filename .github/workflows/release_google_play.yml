name: Build & Sign Flutter App

on:
  push:
    branches: [ main ]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-build.yml'
  workflow_dispatch:
concurrency:

jobs:
  build:
    runs-on: ubuntu-latest
    # HIER DEFINIEREN WIR DIE VARIABLEN FÜR DEN GANZEN JOB:
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ... (Java und Flutter Setup wie bisher) ...

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        working-directory: flutter_app
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-key.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../app/release-key.jks\n' \
            "$KEYSTORE_PASSWORD" "$KEYSTORE_PASSWORD" "$KEY_ALIAS" > android/key.properties

      - name: Build release Bundle
        if: env.KEYSTORE_BASE64 != ''
        working-directory: flutter_app
        run: flutter build appbundle --release

      - name: Build release APK
        if: env.KEYSTORE_BASE64 != ''
        working-directory: flutter_app
        run: flutter build apk --release

      # Jetzt klappt der Upload, weil env.KEYSTORE_BASE64 bekannt ist!
      - name: Upload Release Bundle (.aab)
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: studiumsplaner-release-bundle
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab

      - name: Upload Release APK
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: studiumsplaner-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk


